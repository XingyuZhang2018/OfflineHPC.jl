<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <!-- Julia colors -->
    <!-- Purple: #9558B2, Red: #CB3C33, Green: #389826, Blue: #4063D8 -->
    <linearGradient id="tunnel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4063D8"/>
      <stop offset="50%" stop-color="#9558B2"/>
      <stop offset="100%" stop-color="#389826"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (transparent) -->

  <!-- === Left node: Local machine (has internet) === -->
  <g transform="translate(80, 100)">
    <!-- Outer ring - Blue -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#4063D8" stroke-width="3" opacity="0.3"/>
    <!-- Main circle -->
    <circle cx="0" cy="0" r="42" fill="#4063D8" opacity="0.12"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#4063D8" stroke-width="2.5"/>

    <!-- Laptop icon -->
    <rect x="-16" y="-14" width="32" height="22" rx="2" fill="none" stroke="#4063D8" stroke-width="2"/>
    <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#4063D8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-12" y1="0" x2="8" y2="0" stroke="#4063D8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-12" y1="4" x2="10" y2="4" stroke="#4063D8" stroke-width="1.5" opacity="0.5"/>
    <path d="M-22 12 L-16 8 L16 8 L22 12 Z" fill="none" stroke="#4063D8" stroke-width="2" stroke-linejoin="round"/>

    <!-- WiFi signal arcs (internet) -->
    <path d="M0 -52 Q0 -64 0 -64" fill="none" stroke="#389826" stroke-width="0" />
    <path d="M-8 -56 A12 12 0 0 1 8 -56" fill="none" stroke="#389826" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <path d="M-14 -62 A20 20 0 0 1 14 -62" fill="none" stroke="#389826" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M-20 -68 A28 28 0 0 1 20 -68" fill="none" stroke="#389826" stroke-width="1.8" stroke-linecap="round" opacity="0.3"/>
    <circle cx="0" cy="-52" r="2" fill="#389826" opacity="0.8"/>
  </g>

  <!-- === SSH Tunnel (center) === -->
  <g>
    <!-- Tunnel tube -->
    <path d="M135 100 C200 60, 280 60, 345 100" fill="none" stroke="url(#tunnel)" stroke-width="3" stroke-dasharray="8,5" opacity="0.6" filter="url(#glow)"/>
    <path d="M135 100 C200 140, 280 140, 345 100" fill="none" stroke="url(#tunnel)" stroke-width="3" stroke-dasharray="8,5" opacity="0.6" filter="url(#glow)"/>

    <!-- Data packets flowing through tunnel -->
    <circle r="4" fill="#9558B2" opacity="0.9">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M135 100 C200 60, 280 60, 345 100"/>
    </circle>
    <circle r="3" fill="#CB3C33" opacity="0.8">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.8s" path="M135 100 C200 60, 280 60, 345 100"/>
    </circle>
    <circle r="3.5" fill="#389826" opacity="0.8">
      <animateMotion dur="2.8s" repeatCount="indefinite" begin="0.3s" path="M345 100 C280 140, 200 140, 135 100"/>
    </circle>

    <!-- SSH label -->
    <rect x="212" y="80" width="56" height="22" rx="11" fill="#9558B2" opacity="0.15"/>
    <rect x="212" y="80" width="56" height="22" rx="11" fill="none" stroke="#9558B2" stroke-width="1.5" opacity="0.6"/>
    <text x="240" y="95" text-anchor="middle" font-family="JuliaMono, Consolas, monospace" font-size="11" font-weight="600" fill="#9558B2" letter-spacing="1">SSH</text>
  </g>

  <!-- === Right node: HPC (air-gapped) === -->
  <g transform="translate(400, 100)">
    <!-- Outer ring - Red -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#CB3C33" stroke-width="3" opacity="0.3"/>
    <!-- Main circle -->
    <circle cx="0" cy="0" r="42" fill="#CB3C33" opacity="0.1"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#CB3C33" stroke-width="2.5"/>

    <!-- Server rack icon -->
    <rect x="-16" y="-18" width="32" height="12" rx="2" fill="none" stroke="#CB3C33" stroke-width="2"/>
    <circle cx="-10" cy="-12" r="2" fill="#CB3C33" opacity="0.6"/>
    <line x1="-4" y1="-12" x2="12" y2="-12" stroke="#CB3C33" stroke-width="1.5" opacity="0.4"/>

    <rect x="-16" y="-3" width="32" height="12" rx="2" fill="none" stroke="#CB3C33" stroke-width="2"/>
    <circle cx="-10" cy="3" r="2" fill="#CB3C33" opacity="0.6"/>
    <line x1="-4" y1="3" x2="12" y2="3" stroke="#CB3C33" stroke-width="1.5" opacity="0.4"/>

    <rect x="-16" y="12" width="32" height="12" rx="2" fill="none" stroke="#CB3C33" stroke-width="2"/>
    <circle cx="-10" cy="18" r="2" fill="#CB3C33" opacity="0.6"/>
    <line x1="-4" y1="18" x2="12" y2="18" stroke="#CB3C33" stroke-width="1.5" opacity="0.4"/>

    <!-- Air-gap / shield icon -->
    <path d="M0 -60 L-12 -48 L-12 -38 C-12 -28 0 -22 0 -22 C0 -22 12 -28 12 -38 L12 -48 Z" fill="none" stroke="#CB3C33" stroke-width="1.8" opacity="0.5"/>
    <line x1="-4" y1="-42" x2="4" y2="-34" stroke="#CB3C33" stroke-width="1.8" opacity="0.5"/>
    <line x1="4" y1="-42" x2="-4" y2="-34" stroke="#CB3C33" stroke-width="1.8" opacity="0.5"/>
  </g>

  <!-- === Labels === -->
  <text x="80" y="172" text-anchor="middle" font-family="JuliaMono, Consolas, monospace" font-size="11" fill="#4063D8" opacity="0.8">Local</text>
  <text x="400" y="172" text-anchor="middle" font-family="JuliaMono, Consolas, monospace" font-size="11" fill="#CB3C33" opacity="0.8">HPC</text>
</svg>
